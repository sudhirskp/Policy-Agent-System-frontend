<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Policy Agent System</title>
  <style>
    :root {
      --bg-1: #05070f;
      --bg-2: #0c1326;
      --card: rgba(13, 18, 35, 0.78);
      --text: #e7ebff;
      --muted: #aab4d6;
      --neon: #36f3ff;
      --neon-soft: rgba(54, 243, 255, 0.25);
      --border: rgba(135, 155, 225, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(54, 243, 255, 0.12), transparent 42%),
        radial-gradient(circle at 85% 15%, rgba(69, 127, 255, 0.14), transparent 46%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .app {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 26px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 12px 32px rgba(0, 0, 0, 0.45),
        0 0 20px var(--neon-soft);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    h2 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 1.1rem + 1vw, 2rem);
      letter-spacing: 0.3px;
      color: #f7f9ff;
      text-shadow: 0 0 10px rgba(54, 243, 255, 0.45);
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(9, 14, 29, 0.8);
      color: var(--text);
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea::placeholder {
      color: #8090be;
    }

    textarea:focus {
      border-color: rgba(54, 243, 255, 0.7);
      box-shadow: 0 0 0 3px rgba(54, 243, 255, 0.16);
    }

    button {
      margin-top: 12px;
      border: 1px solid rgba(54, 243, 255, 0.6);
      background: linear-gradient(180deg, #14324a, #0a1f33);
      color: #eaffff;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 0 14px rgba(54, 243, 255, 0.25);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 20px rgba(54, 243, 255, 0.35);
      border-color: rgba(54, 243, 255, 0.9);
    }

    h3 {
      margin: 18px 0 8px;
      color: #c7d5ff;
      font-size: 1rem;
      letter-spacing: 0.2px;
    }

    pre {
      margin: 0;
      min-height: 90px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(8, 12, 24, 0.85);
      padding: 12px 14px;
      color: #d8e0ff;
      overflow: auto;
      box-shadow: inset 0 0 18px rgba(54, 243, 255, 0.08);
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .app {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h2>Policy Agent System</h2>
    <p class="subtitle">Paste policy text below and process it through Multi-Agent.</p>

    <textarea id="policyText" placeholder="Enter policy..."></textarea>
    <button onclick="processPolicy()">Process Policy</button>

    <h3>Response</h3>
    <pre id="output"></pre>
  </main>

  <script>
    async function processPolicy() {
      const outputEl = document.getElementById("output");
      const policy = document.getElementById("policyText").value.trim();

      if (!policy) {
        outputEl.textContent = "Please enter a policy before processing.";
        return;
      }

      outputEl.textContent = "Processing...";

      try {
        const response = await fetch("http://localhost:8080/api/process-policy", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            policyText: policy
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || `Request failed with status ${response.status}`);
        }

        const data = await response.json();
        outputEl.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        outputEl.textContent = `Error: ${error.message}`;
      }
    }
  </script>

</body>
</html>
